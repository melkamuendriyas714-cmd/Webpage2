<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full view of grid </title>

    <style type="text/css">
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
        }

        .main_container {
            height: 100vh;
            width: 100vw;
            display: grid;
            
           
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;

            /* Matches the 3-column definition above */
            grid-template-areas: 
                "item-1 item-2 item-3"
                "item-1 item-4 item-3";
            
            gap: 15px;
            padding: 15px;
            box-sizing: border-box; 
            background-color: #f0f0f0;
        }

        .main {
            display: flex;          
            align-items: center;
            justify-content: center;
            padding: 2em;
            background-color: #3498db;
            color: white;
            font-size: 2rem;
            font-family: sans-serif;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .main:hover {
            filter: brightness(1.1);
        }

        /* Assigning the grid areas */
        .item-1 { 
        	grid-area: item-1;
        	background-color: #2c3e50;
        	 }
        .item-2 { 
        	grid-area: item-2; 
        	background-color: #e74c3c;
        	 }
        .item-3 {
           grid-area: item-3; 
           background-color: #27ae60;
            }
        .item-4 { 
        	grid-area: item-4; 
        	background-color: #f39c12; 
        }

    </style>
</head>

<body>
    
    <div class="main_container">
        <div class="main item-1">Item 1 (Tall)</div>
        <div class="main item-2">Item 2</div>
        <div class="main item-3">Item 3 (Tall)</div>
        <div class="main item-4">Item 4</div>
    </div>

</body>
</html>
